<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Langevin Dynamics Demo</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f9; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #333; }
        .container { display: flex; gap: 30px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 1000px; }
        canvas { border: 2px solid #e0e0e0; border-radius: 10px; background: #fff; cursor: crosshair; }
        .controls { width: 320px; display: flex; flex-direction: column; gap: 18px; }
        .control-group { display: flex; flex-direction: column; }
        label { font-size: 0.85em; font-weight: 700; margin-bottom: 6px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .stats-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9em; }
        .stats-table th, .stats-table td { border: 1px solid #eee; padding: 10px; text-align: center; }
        .stats-table th { background: #fcfcfc; color: #666; }
        .buttons { display: flex; gap: 10px; margin-top: 5px; }
        button { flex: 1; padding: 12px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: all 0.2s; }
        .btn-play { background: #007bff; color: white; }
        .btn-reset { background: #6c757d; color: white; }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        .val { font-weight: bold; float: right; color: #007bff; }
        h2 { margin-bottom: 20px; color: #222; }
    </style>
</head>
<body>

    <h2>Langevin Particle Dynamics</h2>

    <div class="container">
        <div>
            <canvas id="simCanvas" width="600" height="400"></canvas>
            <table class="stats-table">
                <thead>
                    <tr>
                        <th>Region</th>
                        <th>Count</th>
                        <th>Distribution</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="color: #d63384; font-weight: bold;">Left Well (x < 0)</td>
                        <td id="countLeft">0</td>
                        <td id="percentLeft">0%</td>
                    </tr>
                    <tr>
                        <td style="color: #0d6efd; font-weight: bold;">Right Well (x > 0)</td>
                        <td id="countRight">0</td>
                        <td id="percentRight">0%</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Particles (N): <span class="val" id="valN">50</span></label>
                <input type="range" id="paramN" min="1" max="300" value="50">
            </div>
            <div class="control-group">
                <label>Mass (m): <span class="val" id="valM">1.0</span></label>
                <input type="range" id="paramM" min="0.1" max="10" step="0.1" value="1">
            </div>
            <div class="control-group">
                <label>Barrier Height: <span class="val" id="valHeight">5.0</span></label>
                <input type="range" id="paramHeight" min="0" max="25" step="0.5" value="5">
            </div>
            <div class="control-group">
                <label>Well Asymmetry: <span class="val" id="valAsym">0.0</span></label>
                <input type="range" id="paramAsym" min="-10" max="10" step="0.5" value="0">
            </div>
            <div class="control-group">
                <label>Temperature (T): <span class="val" id="valT">1.0</span></label>
                <input type="range" id="paramT" min="0" max="20" step="0.1" value="1">
            </div>
            <div class="control-group">
                <label>Sim Speed: <span class="val" id="valSpeed">1.0x</span></label>
                <input type="range" id="paramSpeed" min="0.1" max="2" step="0.1" value="1">
            </div>

            <div class="buttons">
                <button class="btn-play" id="playPauseBtn">Pause</button>
                <button class="btn-reset" id="resetBtn">Reset Positions</button>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');

    // State Variables
    let particles = [];
    let isRunning = true;
    const dt = 0.005; // Smaller time step for better stability
    const gamma = 2.0; // Friction coefficient

    const config = {
        n: 50,
        m: 1.0,
        height: 5.0,
        asym: 0.0,
        t: 1.0,
        speed: 1.0
    };

    // UI Logic
    const setupSlider = (id, key) => {
        const el = document.getElementById('param' + id);
        el.oninput = (e) => {
            const val = parseFloat(e.target.value);
            config[key] = val;
            document.getElementById('val' + id).innerText = val + (id === 'Speed' ? 'x' : '');
            if (id === 'N') initParticles();
        };
    };

    setupSlider('N', 'n');
    setupSlider('M', 'm');
    setupSlider('Height', 'height');
    setupSlider('Asym', 'asym');
    setupSlider('T', 't');
    setupSlider('Speed', 'speed');

    document.getElementById('playPauseBtn').onclick = (e) => {
        isRunning = !isRunning;
        e.target.innerText = isRunning ? "Pause" : "Play";
        e.target.style.background = isRunning ? "#007bff" : "#28a745";
    };

    document.getElementById('resetBtn').onclick = () => initParticles();

    function initParticles() {
        particles = [];
        for (let i = 0; i < config.n; i++) {
            particles.push({
                x: (Math.random() - 0.5) * 2, // Start near the center barrier
                v: 0
            });
        }
    }

    // Potential: V(x) = h*(x^2 - 1)^2 + a*x
    function getV(x) {
        return config.height * Math.pow(Math.pow(x, 2) - 1, 2) + config.asym * x;
    }

    // Force: -dV/dx
    function getForce(x) {
        return -(4 * config.height * x * (x * x - 1) + config.asym);
    }

    function update() {
        if (!isRunning) return;

        // Effective delta time adjusted by user speed
        const step = dt * config.speed;
        
        // Diffusion term: sqrt(2 * gamma * kB * T * dt)
        const sigma = Math.sqrt(2 * gamma * config.t * step);

        let left = 0;
        let right = 0;

        for (let p of particles) {
            // Box-Muller for Gaussian noise
            const u1 = Math.random();
            const u2 = Math.random();
            const rand = Math.sqrt(-2.0 * Math.log(u1 || 0.000001)) * Math.cos(2.0 * Math.PI * u2);

            const f_ext = getForce(p.x);
            const f_drag = -gamma * p.v;
            
            // Euler-Maruyama integration step
            // dv = (F_ext + F_drag)/m * dt + (sigma * rand)/m
            const dv = ((f_ext + f_drag) / config.m) * step + (sigma * rand) / config.m;
            p.v += dv;
            p.x += p.v * step;

            // Boundary safety: wrap or bounce if they go too far (numerical insurance)
            if (p.x > 3) { p.x = 3; p.v *= -0.2; }
            if (p.x < -3) { p.x = -3; p.v *= -0.2; }

            if (p.x < 0) left++; else right++;
        }

        document.getElementById('countLeft').innerText = left;
        document.getElementById('countRight').innerText = right;
        document.getElementById('percentLeft').innerText = Math.round((left/config.n)*100) + "%";
        document.getElementById('percentRight').innerText = Math.round((right/config.n)*100) + "%";
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const scaleX = 100; // px per unit
        const scaleY = 6;   // px per energy unit
        const centerX = canvas.width / 2;
        const centerY = canvas.height - 80;

        // 1. Draw Axis
        ctx.strokeStyle = "#eee";
        ctx.beginPath();
        ctx.moveTo(0, centerY); ctx.lineTo(canvas.width, centerY);
        ctx.stroke();

        // 2. Draw Potential Well Curve
        ctx.beginPath();
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#444";
        for (let x = -2.5; x <= 2.5; x += 0.05) {
            const y = getV(x);
            const sx = centerX + x * scaleX;
            const sy = centerY - y * scaleY;
            if (x === -2.5) ctx.moveTo(sx, sy);
            else ctx.lineTo(sx, sy);
        }
        ctx.stroke();

        // 3. Draw Particles
        particles.forEach(p => {
            const py = getV(p.x);
            const sx = centerX + p.x * scaleX;
            const sy = centerY - py * scaleY;

            ctx.beginPath();
            ctx.arc(sx, sy - 4, 4, 0, Math.PI * 2);
            // Color based on which side they are on
            ctx.fillStyle = p.x < 0 ? "rgba(214, 51, 132, 0.7)" : "rgba(13, 110, 253, 0.7)";
            ctx.fill();
            ctx.strokeStyle = "white";
            ctx.lineWidth = 1;
            ctx.stroke();
        });
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    initParticles();
    loop();
</script>
</body>
</html>
